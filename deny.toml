# cargo-deny configuration for SciRS2
# This file defines policies for dependencies, licenses, and security

[advisories]
version = 2
ignore = [
    "RUSTSEC-2024-0436", # paste - unmaintained but widely used, no replacement yet
    "RUSTSEC-2024-0384", # instant - unmaintained, transitive dep via criterion/tokio
    "RUSTSEC-2025-0134", # rustls-pemfile - unmaintained, transitive dep via rumqttc
    # aws-lc-sys 0.38.x vulnerabilities: transitive via reqwest→rustls→aws-lc-rs
    # Will be resolved when reqwest/rustls update to aws-lc-rs >= 1.16.2 (aws-lc-sys 0.39+)
    "RUSTSEC-2026-0044", # aws-lc-sys: X.509 Name Constraints Bypass (fixed in 0.39.0)
    "RUSTSEC-2026-0048", # aws-lc-sys: CRL Distribution Point logic error (fixed in 0.39.0)
    "RUSTSEC-2026-0049", # rustls-webpki 0.102.8: CRL scope check (fixed in 0.103.10)
]

[licenses]
version = 2
# Licensing policy for COOLJAPAN Pure Rust ecosystem
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "NCSA",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Multiple versions of the same crate
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

# Deny specific crates per COOLJAPAN Pure Rust Policy
deny = [
    # OpenBLAS/BLAS dependencies (use OxiBLAS instead)
    { name = "openblas-src" },
    { name = "blas-src" },
    { name = "cblas-sys" },
    { name = "lapack-src" },
    { name = "lapacke-sys" },

    # bincode (use oxicode instead)
    { name = "bincode" },
]

# Skip version checking for certain crates
skip = []
skip-tree = []

[sources]
# Only allow crates from official registries and COOLJAPAN org
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["cool-japan", "rust-lang"]
