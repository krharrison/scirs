name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }}, Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]
        include:
          - os: ubuntu-latest
            rust: beta

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust-${{ matrix.os }}-${{ matrix.rust }}"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build workspace
        run: cargo build --workspace --all-features

      - name: Run tests with nextest
        run: |
          cargo nextest run \
            --workspace \
            --all-features \
            --no-fail-fast \
            --test-threads=4
        timeout-minutes: 45

      - name: Run doctests
        run: cargo test --doc --workspace --all-features

  check:
    name: Format + Clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: |
          cargo clippy \
            --workspace \
            --all-targets \
            --all-features \
            -- \
            -D warnings \
            -D clippy::unwrap_used \
            -W clippy::expect_used

  minimal-build:
    name: Minimal Build (no default features)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build core crates with no default features
        run: |
          for crate in scirs2-core scirs2-linalg scirs2-fft scirs2-signal \
                       scirs2-integrate scirs2-stats scirs2-special \
                       scirs2-sparse scirs2-ndimage; do
            if [ -d "$crate" ]; then
              echo "Building $crate --no-default-features..."
              cargo build -p "$crate" --no-default-features
            fi
          done

  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check documentation
        env:
          RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links"
        run: cargo doc --workspace --all-features --no-deps

  pure-rust-policy:
    name: Pure Rust Policy Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify no openblas/lapack/bincode dependencies
        run: |
          # Ensure Pure Rust Policy (COOLJAPAN Ecosystem)
          if cargo tree --all-features 2>/dev/null | grep -i "openblas\|lapack\b"; then
            echo "ERROR: openblas/lapack found - use OxiBLAS instead"
            exit 1
          fi
          if cargo tree --all-features 2>/dev/null | grep -w "bincode"; then
            echo "ERROR: bincode found - use oxicode instead"
            exit 1
          fi
          echo "Pure Rust Policy: PASSED"

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs:
      - test
      - check
      - minimal-build
      - docs
      - pure-rust-policy
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          results=(
            "${{ needs.test.result }}"
            "${{ needs.check.result }}"
            "${{ needs.minimal-build.result }}"
            "${{ needs.docs.result }}"
            "${{ needs.pure-rust-policy.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" ]]; then
              echo "CI failed: one or more jobs did not succeed (result: $result)"
              exit 1
            fi
          done
          echo "All CI checks passed."
