# SciRS2 Performance SLA Baselines
# Version: 0.4.0
# Generated: 2026-03-24
#
# These are minimum performance guarantees (conservative upper bounds).
# Measured on reference platform: Ubuntu 22.04, 4-core x86_64, 16 GB RAM.
# Production deployments on higher-spec hardware should comfortably exceed
# these targets.
#
# All latency values are in milliseconds (wall-clock time).
# Throughput values are in operations per second.

[metadata]
version = "0.4.0"
generated = "2026-03-24"
measurement_platform = "GitHub Actions ubuntu-latest (4-core x86_64, 16GB RAM)"
pure_rust = true
note = "All benchmarks use Pure Rust implementations (OxiBLAS, OxiFFT). No C/Fortran."

# ==============================================================================
# Linear Algebra (scirs2-linalg)
# ==============================================================================

